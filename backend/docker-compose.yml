version: "3.8"

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: lem-postgres
    environment:
      POSTGRES_DB: life_env_map
      POSTGRES_USER: lem_user
      POSTGRES_PASSWORD: lem_pass_2026
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: lem-redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
